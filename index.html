<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Putting Speed Trainer</title>
    <link rel="stylesheet" href="src/css/styles.css?v=10">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="src/assets/icon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PuttTracker">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
</head>
<body>
    <header class="app-header">
        <h1>Putting Speed Trainer</h1>
        <span class="version-badge">v10 gate pixels</span>
    </header>
    <div class="container">
        <div class="video-container">
            <video id="video" playsinline autoplay muted></video>
            <canvas id="canvas"></canvas>
        </div>
        <div class="controls">
            <button id="start-camera-btn">Start Camera</button>
            <button id="switch-camera-btn" disabled>Switch Camera</button>
            <button id="setup-markers-btn" disabled>Setup Markers</button>
            <label class="field">
                <span>Gate distance</span>
                <input id="gate-distance-ft" type="number" inputmode="decimal" min="0.5" step="0.5" value="6">
                <span>ft</span>
            </label>
            <p id="instructions"></p>
            <div id="status-container">
                Status: <span id="status-indicator">Idle</span>
            </div>
            <div id="log-container" class="log-container"></div>
            <div id="results-container" class="results-container" style="display: none;">
                <h2>Results</h2>
                <p>Putting Speed: <span id="speed-display">0.00</span> mph</p>
                <div id="recording-controls">
                    <!-- Download and replay buttons will be inserted here -->
                </div>
                <div id="replay-container" class="replay-container" style="display: none;">
                    <video id="replay-video" controls playsinline></video>
                    <button id="close-replay-btn" class="button">Close Replay</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="src/js/app.js?v=10"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.getRegistrations()
                    .then(registrations => Promise.all(registrations.map(registration => registration.unregister())))
                    .then(() => console.log('Service workers unregistered for no-cache test build.'))
                    .catch(error => console.log('Service worker cleanup failed: ', error));
            });
        }
        if ('caches' in window) {
            caches.keys()
                .then(keys => Promise.all(keys.map(key => caches.delete(key))))
                .then(() => console.log('Old app caches cleared for no-cache test build.'))
                .catch(error => console.log('Cache cleanup failed: ', error));
        }
    </script>
</body>
</html>
